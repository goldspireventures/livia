kind = "web"
previewPath = "/livia-marketing/"
title = "livia.io"
version = "1.0.0"
id = "artifacts/livia-marketing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/livia-marketing/" ]
localPort = 24439

[services.development]
run = "pnpm --filter @workspace/livia-marketing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/livia-marketing", "run", "build" ]
publicDir = "artifacts/livia-marketing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24439"
BASE_PATH = "/livia-marketing/"
