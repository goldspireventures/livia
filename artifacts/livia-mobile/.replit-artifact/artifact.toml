kind = "mobile"
previewPath = "/mobile/"
title = "Livia Mobile"
version = "1.0.0"
id = "artifacts/livia-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 24839

[services.development]
run = "pnpm --filter @workspace/livia-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/livia-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/livia-mobile", "run", "serve" ]

[services.env]
PORT = "24839"
BASE_PATH = "/mobile/"
