kind = "web"
previewPath = "/"
title = "Livia Dashboard"
version = "1.0.0"
id = "artifacts/livia-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20645

[services.development]
run = "pnpm --filter @workspace/livia-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/livia-dashboard", "run", "build" ]
publicDir = "artifacts/livia-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20645"
BASE_PATH = "/"
