  <rect x="0.5" y="0.5" width="179" height="179" rx="39.5" fill="none" stroke="#d9c39a" stroke-opacity="0.28" stroke-width="1"/>
  <text class="livia-serif" x="48" y="120" font-size="106" fill="#f6f3ec" letter-spacing="-0.08em">L</text>
  <text class="livia-serif" x="98" y="120" font-size="106" font-style="italic" fill="url(#livia-champagne)">v</text>
