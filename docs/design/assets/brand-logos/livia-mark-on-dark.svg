<svg width="512" height="512" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Livia">
  <defs>
    <style type="text/css">
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&amp;display=swap");
      .livia-serif { font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif; font-weight: 400; }
    </style>
    <linearGradient id="livia-ink-bg" x1="0" y1="0" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e0e16"/>
      <stop offset="100%" stop-color="#06060c"/>
    </linearGradient>
    <linearGradient id="livia-champagne" x1="0" y1="20" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f6f3ec"/>
