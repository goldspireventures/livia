meta:
  id: w4.ops.bookings.list.web
  world: W4
  route: "/bookings"
  artifact: livia-dashboard
  persona: [P2, P3, P6]
  verticals: all
  release: R1
  status: designed

job: >
  Operate the calendar — day/week view, filters, open detail — floor truth for reception.

visual:
  canvas:
    device: desktop
    viewport: 1440x900
  zones:
    - id: toolbar
      content:
        - date picker today default
        - view toggle Day | Week
        - staff filter multi-select
        - CTA "New booking" primary
    - id: calendar_grid
      layout: week columns × time rows OR day staff columns
      content:
        - booking blocks color by status
        - drag reschedule R2 — read-only R1 tap to detail
        - gap holes visible — Liv suggestion chip optional
    - id: mobile_fallback
      viewport: "<640px"
      layout: agenda list by time
  motion:
    date_change: crossfade grid 200ms

states:
  empty_day:
    copy: "Nothing booked — share your /b link"
    action: copy link button
  loading:
    visual: grid skeleton

acceptance:
  e2e:
    - bookings list smoke
  vertical:
    - fitness shows class blocks not chair columns

traceability:
  surfaceId: tenant.bookings.list
  figma:
    frame: W4-Tenant/w4.ops.bookings.list.web
    status: not_started
