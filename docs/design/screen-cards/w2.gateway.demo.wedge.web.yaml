meta:
  id: w2.gateway.demo.wedge.web
  world: W2
  route: "/demo/wedge/:vertical"
  artifact: livia-dashboard
  persona: [Prospect]
  verticals: all_registry
  release: R1
  status: designed

job: >
  Prospect sees their picked world become the story — G2 beats then G3 role enter.
  Inherits W1 /demo concierge gate ambient (gold nebula, LIVE, navy) — not G1 aurora.

visual:
  canvas:
    device: responsive
    viewport: 1440x900
    background: W1 demo flow — midnight navy + champagne gold nebula corners (DemoFlowShell)
  inheritance:
    from: w1.marketing.demo.web
    shell: artifacts/livia-dashboard/src/components/gateway/demo-flow-shell.tsx
    css: artifacts/livia-dashboard/src/styles/gateway-demo-flow.css
  zones:
    - id: fused_card_stage
      layout: centered
      content:
        - serif headline "See your week in four beats"
        - champagne subline — world you picked, Liv walks you through
        - G1 gold-framed trade card — photo well shows current beat UI crop
        - beat headline + detail inside card shell
        - Liv briefing chip overlays card corner (sign-in DNA)
        - primary "Next beat" inside card footer (beat 4 → Enter demo)
    - id: carousel_chrome
      content:
        - 4 progress dots below card
        - back link "← Worlds" gold outline
  beats_by_vertical:
    beauty:
      - { headline: "Inquiry in Inbox", crop: inbox }
      - { headline: "Book + intake note", crop: public-book }
      - { headline: "Reminder SMS", crop: sms }
      - { headline: "Today — stations clear", crop: today }
  motion:
    beat_transition: card well crossfade 300ms
    frame: gold border persists — only inner crop + copy change
  northstarRealPath: docs/design/assets/w2-gateway/demo/g2-wedge-story.target.png

acceptance:
  human:
    - One fused surface — no 50/50 split between G1 and sign-in
    - Same card shell all beats — only crop/copy change per vertical policy
  e2e:
    - full-platform-demo.spec.ts wedge routes
  visual:
    - baseline: g2-wedge-story.target.png (locked 2026-06-02 — fusion cardstage)

traceability:
  surfaceId: gateway.demo.wedge
  figma:
    frame: W2/w2.gateway.demo.wedge.web
    status: not_started
