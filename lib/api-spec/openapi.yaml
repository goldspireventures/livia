      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                phoneNumber: { type: string, description: "E.164 (e.g. +35315551234). Omit to let server pick." }
                countryCode: { type: string, default: "IE" }
                areaCode: { type: string, description: "Defaults to '1' (Dublin) when countryCode=IE." }
      responses:
        "201":
          description: Provisioned
          content:
            application/json:
              schema:
                type: object
                required: [twilioPhoneNumber, twilioPhoneSid, smsWebhookUrl]
                properties:
                  twilioPhoneNumber: { type: string }
                  twilioPhoneSid: { type: string }
                  smsWebhookUrl: { type: string }
        "404":
          description: No available numbers in country/area
        "409":
          description: Already provisioned
        "503":
          description: Twilio or PUBLIC_BASE_URL not configured

