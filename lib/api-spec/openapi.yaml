openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Livia API — multi-tenant appointment operating system
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: me
    description: Authenticated user profile
  - name: businesses
    description: Business management
  - name: staff
    description: Staff management
  - name: services
    description: Service catalog
  - name: customers
    description: Customer management
  - name: bookings
    description: Booking management
  - name: wellness
    description: Wellness vertical — reports, reception, vault, brokers
  - name: availability
    description: Availability rules and time off
  - name: slots
    description: Available slot engine
  - name: public
    description: Public booking page (unauthenticated)
  - name: dashboard
    description: Dashboard summary and analytics
  - name: feature-flags
    description: Feature flags
  - name: conversations
    description: AI inbox conversations and messages
  - name: chat
    description: Public AI chat assistant
  - name: marketing
    description: Public marketing site (livia.io) lead capture
  - name: communications
    description: Per-shop Twilio number + Resend from-address provisioning (owner/admin)
  - name: billing
    description: Plan, entitlements, usage meters, and Stripe checkout
  - name: insights
    description: Cross-tenant peer benchmarks (k-anonymity gated)
  - name: partner
    description: Read-only partner API (X-Partner-Api-Key)
  - name: voice
    description: Voice receptionist (entitlement-gated)
  - name: channels
    description: Inbound channel webhooks (Twilio SMS)
  - name: internal
    description: Internal routes (cron sweeps + Livia Inc ops API, header-secret protected)
  - name: internal-ops
    description: Livia Inc tenant directory (X-Internal-Ops-Secret)
  - name: dev
    description: Development-only workspace seeding (disabled in production)
  - name: onboarding
    description: Self-serve business onboarding catalog and preview
  - name: support
    description: In-app help, bugs, and feature requests (tenant → Livia Inc)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Me ───────────────────────────────────────────────────────────────────
  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get authenticated user profile
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateMe
      tags: [me]
      summary: Update authenticated user profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/businesses:
    get:
      operationId: getMyBusinesses
      tags: [me]
      summary: Get all businesses the authenticated user belongs to
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/chain-rollup:
    get:
      operationId: getMyChainRollup
      tags: [me]
      summary: Multi-shop KPI rollup for the authenticated owner (RFC 0010)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Chain rollup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainRollup"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/businesses/{businessId}/membership:
    get:
      operationId: getMyMembership
      tags: [me]
      summary: Get caller's role + staff link inside a business
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
      responses:
        "200":
          description: Membership info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /me/notifications:
    get:
      operationId: listMyNotifications
      tags: [me]
      summary: In-app notification feed for the signed-in user (persona-targeted at delivery)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: businessId
          in: query
          schema: { type: string }
        - name: unreadOnly
          in: query
          schema: { type: boolean }
        - name: limit
          in: query
          schema: { type: integer, default: 40 }
      responses:
        "200":
          description: Notifications + unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InAppNotificationList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/notifications/unread-count:
    get:
      operationId: getMyNotificationUnreadCount
      tags: [me]
      summary: Unread in-app notification count
      security: [{ bearerAuth: [] }]
      parameters:
        - name: businessId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Count
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count: { type: integer }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/notifications/read-all:
    post:
      operationId: markAllMyNotificationsRead
      tags: [me]
      summary: Mark all in-app notifications read
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                businessId: { type: string }
      responses:
        "200":
          description: Updated count
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated: { type: integer }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/notifications/{notificationId}/read:
    patch:
      operationId: markMyNotificationRead
      tags: [me]
      summary: Mark one in-app notification read
      security: [{ bearerAuth: [] }]
      parameters:
        - name: notificationId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /me/device-tokens:
    post:
      operationId: registerDeviceToken
      tags: [me]
      summary: Register Expo push token for the signed-in user
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDeviceTokenBody"
      responses:
        "200":
          description: Token registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceToken"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/capabilities:
    get:
      operationId: getMeCapabilities
      tags: [me, dashboard]
      summary: Resolved capability graph for the signed-in owner (Era 2 Q2)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: businessId
          in: query
          required: false
          schema: { type: string }
          description: Optional business scope when the user owns multiple locations.
      responses:
        "200":
          description: Tenant capability graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantCapabilitiesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /me/twin/summary:
    get:
      operationId: getMeTwinSummary
      tags: [me, dashboard]
      summary: Business Twin summary for the signed-in owner (Era 2 hub)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: businessId
          in: query
          required: false
          schema: { type: string }
          description: Optional business scope when the user owns multiple locations.
      responses:
        "200":
          description: Twin summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessTwinSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /me/twin/health:
    get:
      operationId: getMeTwinHealth
      tags: [me, dashboard]
      summary: Business Twin domain health scores
      security: [{ bearerAuth: [] }]
      parameters:
        - name: businessId
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Twin health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessTwinHealth"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /me/twin/recommendations:
    get:
      operationId: getMeTwinRecommendations
      tags: [me, dashboard]
      summary: Business Twin prioritized recommendations
      security: [{ bearerAuth: [] }]
      parameters:
        - name: businessId
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Twin recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessTwinRecommendations"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /me/twin/observations:
    get:
      operationId: getMeTwinObservations
      tags: [me, dashboard]
      summary: Active persisted Twin observations
      security: [{ bearerAuth: [] }]
      parameters:
        - name: businessId
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Twin observations bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwinObservationsBundle"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /businesses/{businessId}/my-day:
    get:
      operationId: getMyDay
      tags: [my-day]
      summary: Staff-scoped "my day" slate (today's bookings, next-up, my customers)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
        - name: staffId
          in: query
          required: false
          schema: { type: string }
          description: OWNER/ADMIN may pass an explicit staffId to audit a persona.
      responses:
        "200":
          description: My Day slate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyDay"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /businesses/{businessId}/invitations:
    post:
      operationId: createInvitation
      tags: [invitations]
      summary: Invite a teammate (Clerk invitation w/ role metadata)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationBody"
      responses:
        "201":
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          description: Clerk integration not configured

  # ─── Onboarding ───────────────────────────────────────────────────────────
  /onboarding/catalog:
    get:
      operationId: getOnboardingCatalog
      tags: [onboarding]
      summary: Jurisdiction and vertical catalog for onboarding
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Catalog entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingCatalogResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /onboarding/preview:
    post:
      operationId: previewOnboarding
      tags: [onboarding]
      summary: Preview pack defaults before creating a business
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingPreviewBody"
      responses:
        "200":
          description: Resolved defaults
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingDefaults"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /businesses/{businessId}/support/tickets:
    post:
      operationId: createSupportTicket
      tags: [support]
      summary: Report an issue or feature request
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupportTicketBody"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      operationId: listSupportTickets
      tags: [support]
      summary: List support tickets for the business (owner/admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/SupportTicketStatus"
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Businesses ───────────────────────────────────────────────────────────
  /businesses:
    post:
      operationId: createBusiness
      tags: [businesses]
      summary: Create a new business
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusinessBody"
      responses:
        "201":
          description: Created business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /businesses/{businessId}/audit-log:
    get:
      operationId: searchAuditLog
      tags: [audit-log]
      summary: Search hash-chained audit log for a tenant (owner)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
        - name: q
          in: query
          schema: { type: string }
          description: Free-text search across action, resource, actor, and payload
        - name: actionClass
          in: query
          schema: { type: string }
        - name: resourceKind
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Audit log search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogSearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /businesses/{businessId}/wellness/reports:
    get:
      operationId: getWellnessReports
      tags: [wellness]
      summary: Wellness reports bundle (room heatmap, packages, stress score)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
      responses:
        "200":
          description: Reports bundle
        "401":
          $ref: "#/components/responses/Unauthorized"

  /businesses/{businessId}/wellness/eod-close:
    get:
      operationId: getWellnessEodClose
      tags: [wellness]
      summary: End-of-day close narrative for wellness operators
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
      responses:
        "200":
          description: EOD close lines and stats
        "401":
          $ref: "#/components/responses/Unauthorized"

  /businesses/{businessId}/wellness/audit-diary:
    get:
      operationId: getWellnessAuditDiary
      tags: [wellness]
      summary: Wellness audit diary (bookings, Liv memory, audit events)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
      responses:
        "200":
          description: Diary lines
        "401":
          $ref: "#/components/responses/Unauthorized"

  /businesses/{businessId}/wellness/guest-vault:
    get:
      operationId: getWellnessGuestVault
      tags: [wellness]
      summary: Guest vault profile by phone
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
        - name: phone
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Vault profile
        "400":
          $ref: "#/components/responses/BadRequest"

  /businesses/{businessId}/wellness/redeem-code:
    post:
      operationId: lookupWellnessRedeemCode
      tags: [wellness]
      summary: Look up gift or package redemption code
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        "200":
          description: Ledger lookup
        "404":
          $ref: "#/components/responses/NotFound"

  /businesses/{businessId}/wellness/duty-solver:
    post:
      operationId: wellnessDutySolver
      tags: [wellness]
      summary: Find free therapists in a room at an hour
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceName: { type: string }
                hour: { type: number }
      responses:
        "200":
          description: Solver matches

  /businesses/{businessId}/wellness/terminal/checkout:
    post:
      operationId: wellnessTerminalCheckout
      tags: [wellness]
      summary: Stripe Terminal checkout hook for desk payment
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bookingId]
              properties:
                bookingId: { type: string }
      responses:
        "200":
          description: Checkout initiated

  /businesses/{businessId}:
    get:
      operationId: getBusiness
      tags: [businesses]
      summary: Get a business by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
      responses:
        "200":
          description: Business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateBusiness
      tags: [businesses]
      summary: Update a business
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusinessBody"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Staff ────────────────────────────────────────────────────────────────
  /businesses/{businessId}/staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff for a business
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Staff"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Add a staff member
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffBody"
      responses:
        "201":
          description: Created staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /businesses/{businessId}/staff/{staffId}:
    get:
      operationId: getStaff
      tags: [staff]
      summary: Get a staff member
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
        - $ref: "#/components/parameters/StaffId"
      responses:
        "200":
          description: Staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update a staff member
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
        - $ref: "#/components/parameters/StaffId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffBody"
      responses:
        "200":
          description: Updated staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteStaff
      tags: [staff]
      summary: Deactivate a staff member
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
        - $ref: "#/components/parameters/StaffId"
      responses:
        "204":
          description: Deactivated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /businesses/{businessId}/staff/{staffId}/services:
    get:
      operationId: getStaffServices
      tags: [staff]
      summary: Get services assigned to a staff member
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/BusinessId"
        - $ref: "#/components/parameters/StaffId"
      responses:
        "200":
          description: Assigned services
          content:
            application/json:
