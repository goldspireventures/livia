  # ─── Inbound channel webhooks ─────────────────────────────────────────────
  /channels/sms/inbound:
    post:
      operationId: twilioSmsInbound
      tags: [channels]
      summary: Twilio inbound SMS webhook (HMAC-SHA1 signature validated)
      description: |
        Twilio POSTs application/x-www-form-urlencoded with at least
        From, To, Body, MessageSid. Signature header `X-Twilio-Signature`
        is validated unless TWILIO_SKIP_SIGNATURE_VALIDATION=true.
        Always responds with empty TwiML so Twilio never auto-replies
        and never retries against broken state.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [From, To, Body]
              properties:
                From: { type: string }
                To: { type: string }
                Body: { type: string }
                MessageSid: { type: string }
      responses:
        "200":
          description: Empty TwiML ACK
          content:
            text/xml: { schema: { type: string } }
        "403":
          description: Signature validation failed

  /channels/voice/inbound:
    post:
      operationId: twilioVoiceInbound
      tags: [channels, voice]
      summary: Twilio inbound voice webhook (English-IE gather loop)
      description: |
        Twilio POSTs CallSid, From, To. Responds with TwiML Say + Gather.
        No call recording in v1. Requires voice_receptionist entitlement on tenant.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [CallSid, From, To]
              properties:
                CallSid: { type: string }
                From: { type: string }
                To: { type: string }
      responses:
        "200":
          description: TwiML voice response
          content:
            text/xml: { schema: { type: string } }

  /channels/voice/gather:
    post:
      operationId: twilioVoiceGather
      tags: [channels, voice]
      summary: Twilio speech gather callback for Liv voice turns
      parameters:
        - name: conversationId
          in: query
          schema: { type: string }
        - name: slug
          in: query
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [CallSid]
              properties:
                CallSid: { type: string }
                SpeechResult: { type: string }
      responses:
        "200":
          description: TwiML voice response
          content:
            text/xml: { schema: { type: string } }

  /channels/voice/status:
    post:
      operationId: twilioVoiceStatus
      tags: [channels, voice]
      summary: Twilio call status callback (meters voice_minute_inbound)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                CallSid: { type: string }
                CallStatus: { type: string }
                CallDuration: { type: string }
      responses:
        "200":
          description: ACK

  # ─── Internal ops (Livia Inc) ────────────────────────────────────────────
  /internal/ops/tenants:
    get:
      operationId: searchInternalTenants
      tags: [internal-ops]
      summary: Search tenant directory (cross-tenant, read-only)
      security: [{ internalOpsSecret: [] }]
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: Name, slug, owner email, Stripe customer id, or Clerk user id
        - name: limit
          in: query
          schema: { type: integer, default: 25 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Tenant search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalTenantSearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /internal/ops/tenants/{businessId}:
    get:
      operationId: getInternalTenant
      tags: [internal-ops]
      summary: Tenant health card with Stripe / Clerk deep links
      security: [{ internalOpsSecret: [] }]
      parameters:
        - name: businessId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalTenantDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/ops/tenants/{businessId}/support-context:
    get:
      operationId: getInternalTenantSupportContext
      tags: [internal-ops]
      summary: Impersonation policy reminder for support (read-only)
      security: [{ internalOpsSecret: [] }]
      parameters:
        - name: businessId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Support context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalSupportContext"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Internal cron ───────────────────────────────────────────────────────
  /internal/cron/send-reminders:
    post:
      operationId: cronSendReminders
      tags: [internal]
      summary: T-24h booking reminder sweep
      description: |
        Header-protected by `X-Internal-Cron-Secret`. Sends reminder
        emails for CONFIRMED/PENDING bookings starting in [now+23h, now+25h),
        deduped via notificationLogs.templateKey = "booking-reminder-t24".
      parameters:
        - in: header
          name: x-internal-cron-secret
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Sweep result
          content:
            application/json:
              schema:
                type: object
                required: [checked, sent, skipped]
                properties:
                  checked: { type: integer }
                  sent: { type: integer }
                  skipped: { type: integer }
        "401":
          description: Missing or invalid cron secret

  /dev/seed:
    post:
      operationId: seedDevWorkspace
      tags: [dev]
      summary: Seed demo businesses for the authenticated user
      description: |
        **Development only** — returns 403 when `NODE_ENV=production`.
        Creates sample businesses, staff, services, and bookings for local demos.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Seed result (or already-seeded notice)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Not available in production
    delete:
      operationId: clearDevWorkspace
      tags: [dev]
      summary: Remove seeded demo data for the authenticated user
      description: Development only — returns 403 in production.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Not available in production

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalOpsSecret:
      type: apiKey
      in: header
      name: X-Internal-Ops-Secret
      description: Livia Inc operator secret (INTERNAL_OPS_SECRET or INTERNAL_CRON_SECRET fallback)

  parameters:
    BusinessId:
      name: businessId
      in: path
      required: true
      schema:
        type: string
    StaffId:
      name: staffId
      in: path
      required: true
      schema:
        type: string
    ServiceId:
      name: serviceId
      in: path
      required: true
      schema:
        type: string
    CustomerId:
      name: customerId
      in: path
      required: true
      schema:
        type: string
    BookingId:
      name: bookingId
      in: path
      required: true
      schema:
        type: string

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden (insufficient role or read-only persona)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict (e.g. slug taken, slot unavailable)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    BusinessCommunications:
      type: object
      required: [twilioPhoneNumber, twilioPhoneSid, resendFromAddress, providerStatus, smsWebhookUrl]
      properties:
        twilioPhoneNumber: { type: string, nullable: true }
        twilioPhoneSid: { type: string, nullable: true }
        resendFromAddress: { type: string, nullable: true }
        smsWebhookUrl: { type: string, nullable: true }
        voiceWebhookUrl: { type: string, nullable: true }
        voiceStatusWebhookUrl: { type: string, nullable: true }
        providerStatus:
          type: object
          required: [smsProvider, emailProvider, emailDefaultFrom]
          properties:
            smsProvider: { type: string, enum: [twilio, noop] }
            emailProvider: { type: string, enum: [resend, noop] }
            emailDefaultFrom: { type: string, nullable: true }

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    AuditLogEntry:
      type: object
      required:
        - id
        - businessId
        - occurredAt
        - actorKind
        - actorId
        - actionClass
        - resourceKind
      properties:
        id: { type: string }
        businessId: { type: string }
        occurredAt: { type: string, format: date-time }
        actorKind: { type: string }
        actorId: { type: string }
        onBehalfOfId: { type: string, nullable: true }
        actionClass: { type: string }
        resourceKind: { type: string }
        resourceId: { type: string, nullable: true }
        payload:
          type: object
          additionalProperties: true

    AuditLogSearchResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        total: { type: integer }

    InternalTenantListItem:
      type: object
      required: [id, name, slug, ownerId, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        ownerId: { type: string }
        ownerEmail: { type: string, nullable: true }
        planId: { type: string, nullable: true }
        stripeSubscriptionStatus: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        lastBookingAt: { type: string, format: date-time, nullable: true }

    InternalTenantSearchResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/InternalTenantListItem"
        total: { type: integer }

    InternalTenantDeepLinks:
      type: object
      required: [stripeCustomer, clerkUser, tenantDashboard, publicBooking]
      properties:
        stripeCustomer: { type: string, nullable: true }
        clerkUser: { type: string, nullable: true }
        tenantDashboard: { type: string, nullable: true }
        publicBooking: { type: string, nullable: true }

    InternalTenantDetail:
      allOf:
        - $ref: "#/components/schemas/InternalTenantListItem"
        - type: object
          required:
            - timezone
            - tier
            - vertical
            - aiEnabled
            - voiceProvisioned
            - activeStaffCount
            - bookingCount
            - voiceReceptionistEntitled
            - deepLinks
          properties:
            email: { type: string, nullable: true }
            phone: { type: string, nullable: true }
            timezone: { type: string }
            tier: { type: string }
            vertical: { type: string }
            aiEnabled: { type: boolean }
            voiceProvisioned: { type: boolean }
            stripeCustomerId: { type: string, nullable: true }
            stripeSubscriptionId: { type: string, nullable: true }
            twilioPhoneNumber: { type: string, nullable: true }
            activeStaffCount: { type: integer }
            bookingCount: { type: integer }
            lastInboundSmsAt: { type: string, format: date-time, nullable: true }
            voiceReceptionistEntitled: { type: boolean }
            deepLinks:
              $ref: "#/components/schemas/InternalTenantDeepLinks"

    InternalSupportContext:
      type: object
      required: [businessId, impersonationPolicy, note]
      properties:
        businessId: { type: string }
        impersonationPolicy: { type: string }
        note: { type: string }

    EntitlementRequiredError:
      type: object
      required: [error, code, entitlement, planId]
      properties:
        error: { type: string }
        code:
          type: string
          enum: [ENTITLEMENT_REQUIRED]
        entitlement: { type: string }
        planId: { type: string }
        planName: { type: string }

    BillingState:
      type: object
      required:
        - businessId
        - planId
        - planName
        - entitlements
        - usage
        - voiceOutcomeShareEurCents
      properties:
        businessId: { type: string }
        planId: { type: string }
        planName: { type: string }
        tier: { type: string }
        baseEurCentsPerMonth: { type: integer }
        seatEurCentsPerMonth: { type: ["integer", "null"] }
        activeStaffSeats: { type: integer }
        entitlements:
          type: array
          items: { type: string }
        usage:
          type: object
          additionalProperties: { type: integer }
        voiceOutcomeShareEurCents: { type: integer }
        voiceOutcomeCapEurCents: { type: ["integer", "null"] }
        voiceOutcomeShareRate: { type: number }
        stripeSubscriptionStatus: { type: ["string", "null"] }
        designPartnerActive: { type: boolean }

    # ── Users ──
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        fullName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [OWNER, STAFF, ADMIN, SUPERADMIN]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, email, role, createdAt, updatedAt]

    UpdateMeBody:
      type: object
      properties:
        fullName:
          type: string
        avatarUrl:
          type: string

    # ── Business ──
    Business:
      type: object
      properties:
        id:
          type: string
        ownerId:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        addressLine1:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        timezone:
          type: string
        locale:
          type: string
          description: BCP-47 locale for customer-facing copy and formatting (e.g. en-IE)
        currency:
          type: string
          description: ISO 4217 currency code (e.g. EUR)
        logoUrl:
          type: ["string", "null"]
        coverImageUrl:
          type: ["string", "null"]
        instagramHandle:
          type: ["string", "null"]
        aiEnabled:
          type: string
        aiTone:
          type: string
        aiGreeting:
          type: ["string", "null"]
        aiKnowledge:
          type: ["string", "null"]
        aiCanBookDirectly:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        onboardingState:
          $ref: "#/components/schemas/OnboardingState"
        customBookDomain:
          type: ["string", "null"]
        customBookDomainVerified:
          type: boolean
      required: [id, ownerId, name, slug, timezone, createdAt, updatedAt]

    OnboardingState:
      type: object
      description: Self-serve wizard progress (acts A1–A12)
      properties:
        currentAct:
          $ref: "#/components/schemas/OnboardingActId"
        completedActs:
          type: array
          items:
            $ref: "#/components/schemas/OnboardingActId"
        percentComplete:
          type: integer
          minimum: 0
          maximum: 100
        checklist:
          $ref: "#/components/schemas/OnboardingChecklist"
        updatedAt:
          type: string
          format: date-time
      required: [currentAct, completedActs, percentComplete]

    OnboardingActId:
      type: string
      enum:
        - a1_create_business
        - a2_shop_profile
        - a3_service_menu
        - a4_team
        - a5_hours
        - a6_liv
        - a7_channels
        - a8_public_link
        - a9_billing
        - a10_invite_team
        - a11_migration
        - a12_go_live

    OnboardingChecklist:
      type: object
      properties:
        testBooking: { type: boolean }
        livEnabled: { type: boolean }
        publicLinkShared: { type: boolean }
        smsOrVoiceConnected: { type: boolean }
        teamInvited: { type: boolean }
        billingStarted: { type: boolean }
        servicesConfirmed: { type: boolean }
        hoursConfirmed: { type: boolean }

    SupportTicketCategory:
      type: string
      enum: [bug, billing, liv_error, feature, other]

    SupportTicketSeverity:
      type: string
      enum: [blocking, annoying, nice_to_have]

    SupportTicketStatus:
      type: string
      enum: [open, triaged, resolved, closed]

    SupportTicket:
      type: object
      properties:
        id: { type: string }
        businessId: { type: string }
        userId: { type: string }
        category:
          $ref: "#/components/schemas/SupportTicketCategory"
        severity:
          $ref: "#/components/schemas/SupportTicketSeverity"
        description: { type: string }
        status:
          $ref: "#/components/schemas/SupportTicketStatus"
        context:
          type: object
          additionalProperties: true
        consentLogsAccess: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, businessId, userId, category, severity, description, status, createdAt, updatedAt]

    CreateSupportTicketBody:
      type: object
      properties:
        category:
          $ref: "#/components/schemas/SupportTicketCategory"
        severity:
          $ref: "#/components/schemas/SupportTicketSeverity"
        description:
          type: string
          minLength: 10
        context:
          type: object
          additionalProperties: true
        consentLogsAccess:
          type: boolean
          default: false
      required: [category, description]

    CreateBusinessBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        category:
          type: string
        email:
          type: string
        phone:
          type: string
        timezone:
          type: string
        city:
          type: string
        country:
          type: string
        jurisdiction:
          type: string
          description: ISO jurisdiction pack code (IE, GB, DE, ES, IT, NL, PL)
          enum: [IE, GB, DE, ES, IT, NL, PL]
        vertical:
          $ref: "#/components/schemas/BusinessVertical"
        tier:
          $ref: "#/components/schemas/BusinessTier"
        seedDefaults:
          type: boolean
          description: When true (default), seed services and staff from the vertical pack
        starterPack:
          type: boolean
          description: Opt-in vertical starter menu on create (does not auto-complete onboarding acts)
        logoUrl:
          type: string
        instagramHandle:
          type: string
      required: [name, slug]

    BusinessVertical:
      type: string
      enum: [hair, beauty, body-art, wellness, fitness, medspa, allied-health]

    BusinessTier:
      type: string
      enum: [solo, studio, chain, chair-host, white-label]

    OnboardingCatalogResponse:
      type: object
      properties:
        jurisdictions:
          type: array
          items:
            type: object
            properties:
              jurisdiction:
                type: string
              label:
                type: string
              currency:
                type: string
              defaultTimezone:
                type: string
        verticals:
          type: array
          items:
            type: object
            properties:
              vertical:
                $ref: "#/components/schemas/BusinessVertical"
              label:
                type: string
        tiers:
          type: array
          items:
            $ref: "#/components/schemas/BusinessTier"
      required: [jurisdictions, verticals, tiers]

    OnboardingPreviewBody:
      type: object
      properties:
        name:
          type: string
        country:
          type: string
        category:
          type: string
        vertical:
          $ref: "#/components/schemas/BusinessVertical"
        tier:
          $ref: "#/components/schemas/BusinessTier"
        jurisdiction:
          type: string
          enum: [IE, GB, DE, ES, IT, NL, PL]
      required: [name]

    OnboardingDefaults:
      type: object
      properties:
        country:
          type: string
        currency:
          type: string
        locale:
          type: string
        timezone:
          type: string
        euRegion:
          type: string
          enum: [fra, dub]
        vertical:
          $ref: "#/components/schemas/BusinessVertical"
        tier:
          $ref: "#/components/schemas/BusinessTier"
        category:
          type: string
        aiGreeting:
          type: string

    UpdateBusinessBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        category:
          type: string
        email:
          type: string
        phone:
          type: string
        timezone:
          type: string
        addressLine1:
          type: string
        city:
          type: string
        country:
          type: string
        logoUrl:
          type: string
        coverImageUrl:
          type: string
        instagramHandle:
          type: string
        aiEnabled:
          type: string
        aiTone:
          type: string
          enum: [PROFESSIONAL, FRIENDLY, PLAYFUL]
        aiGreeting:
          type: string
        aiKnowledge:
          type: string
        aiCanBookDirectly:
          type: string
        onboardingState:
          $ref: "#/components/schemas/OnboardingState"
        customBookDomain:
          type: ["string", "null"]
        customBookDomainVerified:
          type: boolean

    # ── Staff ──
    Membership:
      type: object
      required: [businessId, role]
      properties:
        businessId: { type: string }
        role:
          type: string
          enum: [OWNER, ADMIN, STAFF]
        staffId:
          type: ["string", "null"]
        isReception:
          type: boolean
          description: Heuristic from staff title/bio (reception/front-desk hint)
        tenureDays:
          type: integer
          description: Days since the linked staff row was created

    InAppNotification:
      type: object
      required: [id, kind, priority, title, body, createdAt]
      properties:
        id: { type: string }
        businessId: { type: ["string", "null"] }
        kind: { type: string }
        priority: { type: string, enum: [info, watch, act] }
        personaHint: { type: ["string", "null"] }
        title: { type: string }
        body: { type: string }
        href: { type: ["string", "null"] }
        mobileHref: { type: ["string", "null"] }
        resourceKind: { type: ["string", "null"] }
        resourceId: { type: ["string", "null"] }
        readAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }

    InAppNotificationList:
      type: object
      required: [data, unreadCount]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/InAppNotification" }
        unreadCount: { type: integer }

    RegisterDeviceTokenBody:
      type: object
      required: [token, platform]
      properties:
        token:
          type: string
          description: Expo push token (ExponentPushToken[...])
        platform:
          type: string
          enum: [IOS, ANDROID, WEB]

    DeviceToken:
      type: object
      required: [id, platform, token, isActive]
      properties:
        id: { type: string }
        platform:
          type: string
          enum: [IOS, ANDROID, WEB]
        token: { type: string }
        isActive: { type: boolean }

    MyDay:
      type: object
      required: [today, week, myCustomers, todayCount, weekCount, role, effectiveRole]
      properties:
        staffId:
          type: ["string", "null"]
        today:
          type: array
          items: { $ref: "#/components/schemas/BookingDetail" }
        week:
          type: array
          items: { $ref: "#/components/schemas/BookingDetail" }
          description: Upcoming bookings for the rest of this week (after today)
        next:
          oneOf:
            - { $ref: "#/components/schemas/BookingDetail" }
            - { type: "null" }
        myCustomers:
          type: array
          items: { $ref: "#/components/schemas/Customer" }
        todayCount: { type: integer }
        weekCount: { type: integer }
        role:
          type: string
          enum: [OWNER, ADMIN, STAFF]
        effectiveRole:
          type: string
          enum: [OWNER, ADMIN, STAFF]

    CreateInvitationBody:
      type: object
      required: [email, role]
      properties:
        email: { type: string, format: email }
        role:
          type: string
          enum: [ADMIN, STAFF]
        redirectUrl:
          type: ["string", "null"]
          description: Optional URL Clerk redirects to after the invitee accepts.

    Invitation:
      type: object
      required: [id, emailAddress, status]
      properties:
        id: { type: string }
        emailAddress: { type: string }
