name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: livia
          POSTGRES_PASSWORD: livia
          POSTGRES_DB: livia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U livia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://livia:livia@localhost:5432/livia
      SUPABASE_DATABASE_URL: postgresql://livia:livia@localhost:5432/livia
      LIVIA_SKIP_PRODUCTION_ENV_CHECK: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Schema + SQL migrations
        run: bash scripts/deploy-migrate.sh

      - name: OpenAPI codegen in sync
        run: bash scripts/check-codegen.sh

      - name: Typecheck
        run: pnpm run typecheck

      - name: Liv golden eval (pre-merge)
        run: pnpm --filter @workspace/eval run test

      - name: API unit tests
        run: pnpm --filter @workspace/api-server run test

      - name: Production readiness gate (authoritative)
        run: node scripts/production-readiness-gate.mjs --skip-smoke

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Naming taboo (Olivia / Bliq)
        run: bash scripts/check-naming-taboo.sh

      - name: Repo health audit
        run: node scripts/repo-health-audit.mjs
        continue-on-error: true

      - name: v3 release sweep (typecheck gate)
        run: bash scripts/v3-release-check.sh

  e2e-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: livia
          POSTGRES_PASSWORD: livia
          POSTGRES_DB: livia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U livia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://livia:livia@localhost:5432/livia
      SUPABASE_DATABASE_URL: postgresql://livia:livia@localhost:5432/livia
      CI: "true"
      E2E_API_BASE: http://127.0.0.1:3001
      E2E_DEMO_SLUG: luxe-salon-spa
      # Minimal env so api-server boots in CI without real vendors
      CLERK_PUBLISHABLE_KEY: pk_test_b25lLXdlYi5jbGVyay5hY2NvdW50cy5kZXYk
      CLERK_SECRET_KEY: sk_test_ci_placeholder_not_for_auth
      INTERNAL_CRON_SECRET: ci-cron-secret
      INTERNAL_OPS_SECRET: ci-ops-secret
      PARTNER_API_KEY: ci-partner-key
      E2E_PARTNER_API_KEY: ci-partner-key
      DASHBOARD_URL: http://127.0.0.1:5173
      MARKETING_URL: http://127.0.0.1:5174
      API_PUBLIC_URL: http://127.0.0.1:3001
      PORT: "3001"
      LIVIA_SKIP_PRODUCTION_ENV_CHECK: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Schema + SQL migrations
        run: bash scripts/deploy-migrate.sh

      - name: Seed demo business
        run: node scripts/seed-demo.mjs

      - name: Build api-server
        run: pnpm --filter @workspace/api-server run build

      - name: Start api-server
        working-directory: artifacts/api-server
        run: |
          node --enable-source-maps ./dist/index.mjs &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3001/api/healthz && break
            sleep 2
          done
          curl -sf http://127.0.0.1:3001/api/healthz

      - name: Founder release gate (truth + api smoke + wargame)
        run: pnpm founder:release-gate -- --level=ci --out=artifacts/founder-gate.json

      - name: Upload founder gate artifact
        uses: actions/upload-artifact@v4
        with:
          name: founder-gate
          path: artifacts/founder-gate.json

      - name: Install Playwright
        run: pnpm --filter @workspace/e2e exec playwright install chromium --with-deps

      - name: Playwright API Gate smoke
        run: pnpm --filter @workspace/e2e run test:api:ci

  staging-smoke:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Staging surface smoke (non-blocking)
        run: pnpm smoke:staging
